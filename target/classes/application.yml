spring:
  application:
    name: financial-crisis
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/financical?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:yseb2260602581}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

llm:
  # 不把真实 Key 写入仓库；本地环境设置 DEEPSEEK_API_KEY 即可启用。
  api-key: ${DEEPSEEK_API_KEY:disabled}
  enabled: ${LLM_ENABLED:true}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:45}
