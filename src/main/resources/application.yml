spring:
  application:
    name: financial-crisis
  datasource:
    url: jdbc:h2:mem:financial_crisis;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  configuration:
    map-underscore-to-camel-case: true

llm:
  # 不把真实 Key 写入仓库；本地环境设置 DEEPSEEK_API_KEY 即可启用。
  api-key: ${DEEPSEEK_API_KEY:disabled}
  enabled: ${LLM_ENABLED:true}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:45}
