spring:
  datasource:
    url: jdbc:h2:mem:financial_crisis_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

# 集成测试使用 MockBean 替代外部模型和 OCR，不访问真实服务。
knowledge:
  enabled: false

# test resources 中的 application.yml 会优先于主配置，因此显式保留 Mapper 路径。
mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
