spring:
  application:
    name: financial-crisis
  config:
    # 允许 IDEA、Maven 和命令行使用同一份本机配置；文件不存在时仍可正常启动。
    # 兼容从仓库根目录或 backend 目录启动，统一读取根目录 .env。
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/financial_crisis?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
    clean-disabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:financial_app}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VHOST:/financial-crisis}
    connection-timeout: 5s
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        concurrency: ${APPROVAL_CONSUMER_CONCURRENCY:2}
        max-concurrency: ${APPROVAL_CONSUMER_MAX_CONCURRENCY:4}
        default-requeue-rejected: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

ocr:
  qwen:
    # OCR 与百炼 Embedding 共用同一个 API Key。
    api-key: ${EMBEDDING_API_KEY:}
    base-url: ${QWEN_OCR_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${QWEN_OCR_MODEL:qwen3.5-ocr}
    timeout-seconds: ${QWEN_OCR_TIMEOUT_SECONDS:60}
    fallback-to-mock: ${QWEN_OCR_FALLBACK_TO_MOCK:false}

llm:
  # 不把真实 Key 写入仓库；本地环境设置 DEEPSEEK_API_KEY 即可启用。
  api-key: ${DEEPSEEK_API_KEY:}
  enabled: ${LLM_ENABLED:true}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:45}

knowledge:
  # 未配置 Embedding Key 时关闭政策 RAG；MySQL 审批主流程仍可正常启动。
  enabled: ${KNOWLEDGE_ENABLED:false}
  embedding:
    api-key: ${EMBEDDING_API_KEY:}
    base-url: ${EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${EMBEDDING_MODEL:text-embedding-v4}
  qdrant:
    url: ${QDRANT_URL:http://localhost:6333}
    api-key: ${QDRANT_API_KEY:}
    collection: ${QDRANT_POLICY_COLLECTION:credit_policy_chunks}

# 偿债能力的确定性参数可通过环境变量覆盖，不再固化在 Java 计算代码中。
approval:
  messaging:
    enabled: ${APPROVAL_MESSAGING_ENABLED:true}
    publish-interval-ms: ${APPROVAL_PUBLISH_INTERVAL_MS:1000}
    retry-delay-ms: ${APPROVAL_RETRY_DELAY_MS:30000}
    max-retries: ${APPROVAL_MAX_RETRIES:3}
    publisher-batch-size: ${APPROVAL_PUBLISHER_BATCH_SIZE:20}
    consume-lease-seconds: ${APPROVAL_CONSUME_LEASE_SECONDS:120}
  documents:
    required-types: ${REQUIRED_DOCUMENT_TYPES:ID_CARD_FRONT,ID_CARD_BACK,BANK_STATEMENT}
  fraud:
    base-score: ${FRAUD_BASE_SCORE:20}
    blacklist-score: ${FRAUD_BLACKLIST_SCORE:75}
    suspicious-mobile-score: ${FRAUD_SUSPICIOUS_MOBILE_SCORE:20}
    high-amount-threshold: ${FRAUD_HIGH_AMOUNT_THRESHOLD:100000}
    short-work-years: ${FRAUD_SHORT_WORK_YEARS:2}
    high-amount-score: ${FRAUD_HIGH_AMOUNT_SCORE:25}
    incomplete-document-score: ${FRAUD_INCOMPLETE_DOCUMENT_SCORE:30}
    medium-risk-threshold: ${FRAUD_MEDIUM_RISK_THRESHOLD:50}
    high-risk-threshold: ${FRAUD_HIGH_RISK_THRESHOLD:80}
  repayment:
    monthly-living-cost: ${REPAYMENT_MONTHLY_LIVING_COST:3000}
    full-time-base-income: ${REPAYMENT_FULL_TIME_BASE_INCOME:12000}
    self-employed-base-income: ${REPAYMENT_SELF_EMPLOYED_BASE_INCOME:10000}
    default-base-income: ${REPAYMENT_DEFAULT_BASE_INCOME:8000}
    annual-seniority-bonus: ${REPAYMENT_ANNUAL_SENIORITY_BONUS:800}
    max-payment-ratio: ${REPAYMENT_MAX_PAYMENT_RATIO:0.45}
    credit-safety-factor: ${REPAYMENT_CREDIT_SAFETY_FACTOR:0.80}
    annual-rate-factor: ${REPAYMENT_ANNUAL_RATE_FACTOR:1.08}
