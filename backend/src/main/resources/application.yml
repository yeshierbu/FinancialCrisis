spring:
  application:
    name: financial-crisis
  config:
    # 允许 IDEA、Maven 和命令行使用同一份本机配置；文件不存在时仍可正常启动。
    # 兼容从仓库根目录或 backend 目录启动，统一读取根目录 .env。
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/financial_crisis?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

ocr:
  baidu:
    api-key: ${BAIDU_API_KEY:}
    base-url: ${BAIDU_OCR_BASE_URL:https://qianfan.baidubce.com/v2}
    model: ${BAIDU_OCR_MODEL:deepseek-ocr}
    timeout-seconds: ${BAIDU_OCR_TIMEOUT_SECONDS:60}
    fallback-to-mock: ${BAIDU_OCR_FALLBACK_TO_MOCK:false}

llm:
  # 不把真实 Key 写入仓库；本地环境设置 DEEPSEEK_API_KEY 即可启用。
  api-key: ${DEEPSEEK_API_KEY:}
  enabled: ${LLM_ENABLED:true}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:45}

knowledge:
  # 未配置 Embedding Key 时关闭政策 RAG；MySQL 审批主流程仍可正常启动。
  enabled: ${KNOWLEDGE_ENABLED:false}
  embedding:
    api-key: ${EMBEDDING_API_KEY:}
    base-url: ${EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${EMBEDDING_MODEL:text-embedding-v4}
  qdrant:
    url: ${QDRANT_URL:http://localhost:6333}
    api-key: ${QDRANT_API_KEY:}
    collection: ${QDRANT_POLICY_COLLECTION:credit_policy_chunks}
